name: deploy after test

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  
  check:
    runs-on: ubuntu-latest

    steps:

      - name: check if success
        run: |
          if [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "Tests workflow run - SUCCESSFULL"
          else
            echo "Warning: Test workflow run - FAILED"
            echo "exitting"
            exit 1
          fi
        