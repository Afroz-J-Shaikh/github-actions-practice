name: reusable workflow

on:
  workflow_call:

    inputs:

      app_name:
        description: 'name of your app'
        type: string
        required: true

      environment:
        description: 'Environment to deploy to'
        type: string
        default: 'staging'
        required: true

    secrets:

      docker_token:
        required: true

    outputs:

      build_version:
        description: build version information
        value: 'v1.0-${{ jobs.steps.set.outputs.SHORT_SHA }}'

jobs:
  
  reusable:
    runs-on: ubuntu-latest

    steps:

      - name: app name & environment
        run: echo  "Building ${{ inputs.app_name }} for  ${{ inputs.environment }}"

      - name: Check docker token 
        run: |
          if [ -z ${{ secrets.docker_token }} ]; then
            echo "Docker token is set: false"
          else
            echo "Docker token is set: true"
          fi

      - name: Set build version value
        id: set
        run: |
          echo "SHORT_SHA=${github.sha::7}" >> $SHORT_SHA
    