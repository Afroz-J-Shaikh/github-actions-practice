name: passing jobs output
on: 
  workflow_dispatch:
jobs:
  set:
    outputs: 
      date_output: ${{ steps.id-1.outputs.date }}
    runs-on: ubuntu-latest
    steps:
      - id: id-1
        name: set output to today's date
        run: |
          echo "date=$(date)" >> "$GITHUB_OUTPUT"
          echo "Set date is :" ${{ steps.id-1.outputs.date}}
  get:
    runs-on: ubuntu-latest
    needs: set
    steps:
      - name: Get output from previous job
        run: echo "Today's date is :" ${{ needs.set.outputs.date }}
    