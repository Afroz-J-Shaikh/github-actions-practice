name: smart pipeline
on:
  push:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: run lint
        run: |
          cd src/
          npm run lint