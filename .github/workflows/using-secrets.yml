name: Using secrets to pull from docker
on:
  workflow_dispatch:
jobs:
  pull-image:
    runs-on: ubuntu-latest
    steps:
      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: pull image
        run: docker pull ${{ vars.DOCKER_USERNAME }}/java-hello-world:latest

      - name: list images from my repo
        run: |
          DATA=$(curl -s -u ${{ vars.DOCKER_USERNAME }}:${{ secrets.DOCKER_TOKEN }} https://hub.docker.com/v2/repositories/${{ vars.DOCKER_USERNAME }}/)
          echo "Repositories:"
          echo "$DATA" | jq -r '.results[].name'