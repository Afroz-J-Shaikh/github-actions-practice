name: environment variable test
on:
  workflow_dispatch:
env:
  APP_NAME: myapp
jobs:
  test:
    env:
      ENVIRONMENT: staging
    runs-on: ubuntu-latest
    steps:
      - name: setting version
        run: |
          echo "APP_NAME :" $APP_NAME
          echo "ENVIRONMENT :" $ENVIRONMENT
          echo "VERSION :" $VERSION
        env:
          VERSION: 1.0.0
