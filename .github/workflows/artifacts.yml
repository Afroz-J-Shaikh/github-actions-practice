name: upload artifacts
on:
  workflow_dispatch:
jobs:
  upload-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: generating a logfile
        run: |
          echo "This is a log file generated by the workflow" > log.txt
          echo "Current date and time: $(date)" >> log.txt
          echo "Workflow run ID: $GITHUB_RUN_ID" >> log.txt
          echo "Workflow run number: $GITHUB_RUN_NUMBER" >> log.txt
          echo "Repository: $GITHUB_REPOSITORY" >> log.txt
          echo "Actor: $GITHUB_ACTOR" >> log.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: log.txt
          path: log.txt
          