name: matrix strategy

on:
  workflow_dispatch:
  #push:
  #branches: [main]
  #paths: matrix.yml

jobs:
  matrix:
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.10"
        fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: installing python version ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: print python version
        run: python ---version
